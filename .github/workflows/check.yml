# Sanity check that runs on every push and PR.
#
# Goal: catch the "I shipped before verifying" failure mode the
# postmortems keep flagging (docs/postmortems/2026-04-25-verify-repair-cascade.md
# Root Cause #4). If any of these steps fail, the commit gets a red ❌
# on github.com — visible BEFORE we waste time on a DMG rebuild + reinstall.
#
# What we deliberately don't do here:
#   - Full electron-builder DMG build (slow; only matters at release time)
#   - Branch protection / required-PR enforcement (solo dev — skip the
#     bureaucracy until there's a second contributor)
#   - Real unit tests (separate project — see CLAUDE.md rule F, the
#     normalize() Pt./Part regression test is the right starting point
#     when test infra lands)

name: check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    # macOS runner because Electron has native modules (better-sqlite3,
    # node-mac-permissions, etc.) that don't cross-compile cleanly from
    # Linux. Costs more Actions minutes but matches the dev environment
    # exactly — what passes here is what runs on Jake's laptop.
    runs-on: macos-latest

    steps:
      - name: Define retry helper
        shell: bash
        run: |
          cat > /tmp/ci-retry.sh <<'EOF'
          #!/usr/bin/env bash
          set -euo pipefail
          max_attempts="${MAX_ATTEMPTS:-3}"
          base_delay="${BASE_DELAY_SECONDS:-2}"
          attempt=1
          while true; do
            if "$@"; then
              exit 0
            fi
            if [ "$attempt" -ge "$max_attempts" ]; then
              echo "Command failed after ${attempt} attempts: $*" >&2
              exit 1
            fi
            sleep_seconds=$((base_delay * attempt))
            echo "Attempt ${attempt}/${max_attempts} failed. Retrying in ${sleep_seconds}s: $*" >&2
            sleep "$sleep_seconds"
            attempt=$((attempt + 1))
          done
          EOF
          chmod +x /tmp/ci-retry.sh

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install dependencies
        # `npm ci` is strict — uses package-lock exactly. If lockfile
        # drifts from package.json this fails loudly, which is what we
        # want (silent drift is how "works on my machine" bugs ship).
        run: /tmp/ci-retry.sh npm ci

      - name: Build (electron-vite)
        # PRIMARY GATE. Catches: missing imports, broken JSX, undefined
        # exports, vite config issues. Doesn't run electron-builder
        # (no DMG) — just confirms the source compiles into the out/
        # bundle. If this fails, the app won't run on Jake's laptop
        # either; that's the bug we want to catch.
        run: /tmp/ci-retry.sh npm run build

      - name: TypeScript type-check (informational)
        # SOFT GATE — continue-on-error is true. Reports type errors
        # but doesn't fail the run.
        #
        # Why soft: as of this workflow's creation there are ~13
        # pre-existing type drift errors (File.path Electron extension,
        # RefObject<T|null> React 18 narrowing, missing image module
        # decls, AlacResult shape mismatch, etc.) that esbuild
        # tolerates but tsc flags. The app builds and runs correctly.
        # Cleaning these up is its own task — see follow-up issue.
        #
        # When the existing 13 are gone, flip this to a hard gate by
        # removing `continue-on-error: true`. New type errors will
        # then break the build, which is what we want long-term.
        continue-on-error: true
        run: npx tsc -b --noEmit

      - name: Python syntax check
        # py_compile catches typos in the maintenance scripts. They run
        # standalone (CLI invocation) so a syntax error wouldn't
        # surface until the user tried to invoke the script.
        run: python -m py_compile core/*.py
